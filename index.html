<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />
    <link
      rel="shortcut icon"
      href="./assets/icon/calculator.png"
      type="image/x-icon"
    />
  </head>
  <body
    class="bg-amber-300 flex flex-col justify-center items-center min-h-screen py-4 px-2"
  >
    <div
      class="flex flex-col gap-7 w-full max-w-90 bg-[#ededede8] rounded-4xl p-7 inset-shadow-[5px_0px_20px_rgba(0,0,0,0.1)] shadow-[6px_6px_10px_rgba(0,0,0,0.2)]"
    >
      <div
        class="w-full shadow-[4px_4px_10px_rgba(0,0,0,0.2),-4px_-4px_10px_rgba(255,255,255,0.7)] p-3 rounded-2xl"
      >
        <div
          class="screen py-5 px-5 bg-[#d1e4f7] inset-shadow-[3px_3px_5px_rgba(0,0,0,0.2)] font-Technology text-right rounded-lg text-[#537394e0] text-5xl"
        >
          0
        </div>
      </div>
      <div class="container gap-2 grid grid-cols-4">
        <button class="btn-style clear-btn bg-[#d9d3c7]">C</button>
        <button class="btn-style btn delete bg-[#d9d3c7]">DEL</button>
        <button class="btn-style change-bg-btn bg-[#d9d3c7]">🔶</button>
        <button class="btn-style btn operator bg-[#a6a5a2]" data-op="/">
          /
        </button>
        <button class="btn-style btn num" data-number="7">7</button>
        <button class="btn-style btn num" data-number="8">8</button>
        <button class="btn-style btn num" data-number="9">9</button>
        <button class="btn-style btn operator bg-[#a6a5a2]" data-op="*">
          X
        </button>
        <button class="btn-style btn num" data-number="4">4</button>
        <button class="btn-style btn num" data-number="5">5</button>
        <button class="btn-style btn num" data-number="6">6</button>
        <button class="btn-style btn operator bg-[#a6a5a2]" data-op="-">
          -
        </button>
        <button class="btn-style btn num" data-number="1">1</button>
        <button class="btn-style btn num" data-number="2">2</button>
        <button class="btn-style btn num" data-number="3">3</button>
        <button
          class="btn-style btn equal row-span-2 bg-[#799aa0] text-white"
          data-op="="
        >
          =
        </button>
        <button class="btn-style btn num" data-number="0">0</button>
        <button class="btn-style btn decimal bg-[#a6a5a2]" data-point=".">
          .
        </button>
        <button class="btn-style btn operator bg-[#a6a5a2]" data-op="+">
          +
        </button>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
